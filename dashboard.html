<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Secure Transaction Dashboard</title>
  <style>
    :root { --deep-blue: #002147; --gold: #D4AF37; }
    * { margin:0; padding:0; box-sizing:border-box; font-family:Segoe UI, sans-serif; }
    body { background: var(--deep-blue); color:white; padding:20px; min-height:100vh; display:flex; justify-content:center; align-items:center; }
    .container { max-width:600px; width:100%; text-align:center; }
    h1 { color: var(--gold); margin-bottom:20px; font-size:28px; }
    .card { background:rgba(255,255,255,0.1); padding:20px; border-radius:12px; margin:20px 0; }
    .btn { background: var(--gold); color: var(--deep-blue); border:none; padding:12px 24px; border-radius:8px; font-weight:bold; cursor:pointer; margin:12px 0; width:100%; font-size:16px; }
    .logout { background:#ff6b6b; }
    footer { margin-top:40px; font-size:12px; color:#bbb; }
  </style>
</head>
<body>
  <div class="container">
    <h1>KS1 ALKEBULAN PAY</h1>
    <div class="card">
      <h2>Welcome, <span id="tradeId">—</span>!</h2>
      <p>Start a secure transaction or manage active ones.</p>
    </div>
    <button class="btn" onclick="startEscrow()">+ New Secure Transaction</button>
    <button class="btn secondary" onclick="viewActive()">View Active Transactions</button>
    <button class="btn logout" onclick="logout()">Logout</button>

    <footer>
      <p>© 2026 KS1 ALKEBULAN PAY – A Nonprofit Project By KS1 Empire Group & Foundation (KS1EGF)</p>
    </footer>
  </div>

  <script>
    const token = localStorage.getItem('ks1_token');
    const tradeId = localStorage.getItem('ks1_tradeId');
    if (!token || !tradeId) window.location.href = 'index.html';
    document.getElementById('tradeId').textContent = tradeId;

    function logout() {
      localStorage.clear();
      window.location.href = 'index.html';
    }

    function startEscrow() {
      const counterparty = prompt("Counterparty Trade ID:");
      const amount = prompt("Amount (GHS):");
      if (!counterparty || !amount) return;

      fetch('https://ks1-alkebulan-pay-backend.onrender.com/escrow/create', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ initiatorId: tradeId, counterpartyId: counterparty, amount, description: 'Secure transaction' })
      }).then(r => r.json()).then(res => {
        alert(`✅ Escrow initiated!\nTransaction ID: ${res.id}\n\nNow complete payment via Hubtel.`);
      }).catch(err => alert('Error: ' + err.message));
    }

    function viewActive() {
      alert('Active transactions will appear soon.');
    }
  </script>
</body>
</html>
