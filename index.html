<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KS1 Secure Transaction</title>
  <style>
    body { font-family: Arial, sans-serif; background: #050A16; color: white; padding: 20px; }
    .container { max-width: 700px; margin: 0 auto; }
    input, button {
      width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444;
      background: #111; color: white; font-size: 16px;
    }
    button { background: #D4AF37; color: #001A3D; border: none; font-weight: bold; cursor: pointer; }
    .card { background: rgba(255,255,255,0.05); padding: 24px; border-radius: 16px; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Complete Payment</h2>
    <input type="text" id="sellerSmeId" placeholder="Seller SME ID" required />
    <input type="number" id="totalAmount" placeholder="Total Amount (GHS)" required />
    <button onclick="completePayment()">Release Funds</button>
    <div id="status"></div>
  </div>

  <script>
    async function completePayment() {
      const sellerSmeId = document.getElementById('sellerSmeId').value.trim();
      const totalAmount = parseFloat(document.getElementById('totalAmount').value);

      if (!sellerSmeId || isNaN(totalAmount)) {
        alert('Invalid input');
        return;
      }

      document.getElementById('status').innerHTML = '<p>Releasing funds...</p>';

      try {
        // Simulate escrow release
        await new Promise(r => setTimeout(r, 800));

        // 🔥 Notify Trust Score
        fetch('https://ks1-trust-score.onrender.com/api/trust/recalculate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            smeId: sellerSmeId,
            eventType: 'transaction.completed',
            eventData: { amount: totalAmount }
          })
        }).catch(err => console.error('Trust Score update failed:', err));

        document.getElementById('status').innerHTML = 
          `<p style="color:#4caf50;">✅ Payment released! Seller trust score updated.</p>`;
      } catch (err) {
        document.getElementById('status').innerHTML = 
          `<p style="color:#f44336;">❌ Payment failed</p>`;
      }
    }
  </script>
</body>
</html>
